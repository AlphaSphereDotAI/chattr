[project]
authors = [
  { email = "mohamed.hisham.abdelzaher@gmail.com", name = "Mohamed Hisham Abdelzaher" },
]
dependencies = [
  "agno[google,qdrant]>=2.5.14",
  "ddgs>=9.13.0",
  "fastembed>=0.8.0",
  "gradio[mcp]>=6.11.0",
  "m3u8>=6.0.0",
  "mem0ai>=1.0.11",
  "poml>=0.0.8",
  "rich>=14.3.3",
]
description = "App part of the Chatacter Backend"
name = "chattr"
readme = "README.md"
requires-python = ">=3.14.3,<3.15"
version = "0.0.157"

[project.scripts]
chattr = "chattr.__main__:main"

[build-system]
build-backend = "uv_build"
requires = ["uv_build"]

[dependency-groups]
dev = [
  "doppler-env>=0.3.1",
  "pre-commit>=4.5.1",
  "pytest-emoji>=0.2.0",
  "pytest-md>=0.2.0",
  "pytest-mergify>=2026.4.7.1",
  "ruff>=0.15.9",
  "ty>=0.0.29",
  "uv-build>=0.11.3",
]

[tool.ruff]
extend = ".github/lint/.ruff.toml"
